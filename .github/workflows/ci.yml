name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Lint (จับบั๊ก อ้างอิงชื่อที่ไม่มีจริง ฯลฯ)
        run: npm run lint
        continue-on-error: true
      - name: Unit tests
        run: npm test
